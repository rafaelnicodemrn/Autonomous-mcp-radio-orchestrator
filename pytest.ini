[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=src
    --cov=telegram_bot
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=20
markers =
    smoke: testes de sanidade básica (importações, config)
    unit: testes unitários sem I/O externo
    integration: testes com múltiplos módulos integrados
    slow: testes que demoram mais de 2 segundos
