name: CI — Lint e Testes

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]
  workflow_call:

jobs:
  lint:
    name: "Lint (flake8 + black + isort)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências de lint
        run: pip install flake8 black isort

      # Lint roda em modo "advisory" enquanto o código não passa por um
      # `make format` inicial. Após esse passo, remover o continue-on-error
      # e tornar o job bloqueante.
      - name: black (verificação de formatação)
        continue-on-error: true
        run: black --check --diff src/ telegram_bot.py

      - name: isort (verificação de imports)
        continue-on-error: true
        run: isort --check-only --diff src/ telegram_bot.py

      - name: flake8 (estilo e erros)
        continue-on-error: true
        run: |
          flake8 src/ telegram_bot.py \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=.venv,__pycache__

  test:
    name: "Testes Automatizados"
    runs-on: ubuntu-latest
    needs: lint

    env:
      TELEGRAM_BOT_TOKEN: "fake_token_for_testing"
      GOOGLE_API_KEY: "fake_api_key"
      CONFIG_PATH: "config.yaml.example"
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Rodar testes (smoke + unit + integration)
        run: pytest tests/

      - name: Publicar cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Verificar credenciais não commitadas
        run: |
          if git ls-files | grep -E "\.env$"; then
            echo "ERRO: arquivo .env encontrado no repositório!"
            exit 1
          fi
          if git ls-files | grep -E "token\.json|client_secret|service_account|oauth_token|credentials\.json|adaptive_state\.json|telegram_state\.json"; then
            echo "ERRO: arquivo de credencial ou estado de runtime encontrado!"
            exit 1
          fi
          echo "OK: Nenhuma credencial encontrada."

  security:
    name: "Segurança (bandit + pip-audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ferramentas de segurança
        run: pip install bandit pip-audit

      - name: bandit
        run: |
          bandit -r src/ telegram_bot.py -ll \
            --exclude ".venv,tests" -f txt || true

      - name: pip-audit
        run: pip-audit -r requirements.txt || true
