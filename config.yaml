# ═══════════════════════════════════════════════════════════════════════════════
# RadioIA Pessoal — config.yaml
# Rafael Nicodem | Product Owner | Medianeira-PR | Cidadão BR + LU
# Gremista | Católico | Tech & Filosofia | Conservador
# Modelo: Briefing Diário + On-Demand
# ═══════════════════════════════════════════════════════════════════════════════

radio:
  name: "RadioIA Pessoal"
  background_music: ""
  background_volume_db: -22

llm:
  model: "gemini/gemini-3.1-flash-lite"

# ── TTS: Google Cloud Chirp3-HD (1M chars/mês gratuito) ──────────────────────
tts:
  provider: google
  google:
    credentials_env: GOOGLE_APPLICATION_CREDENTIALS
    language_code: pt-BR
    voice_map:
      pt-BR-ThalitaMultilingualNeural: pt-BR-Chirp3-HD-Aoede
      pt-BR-AntonioNeural:             pt-BR-Chirp3-HD-Charon
      pt-BR-FranciscaNeural:           pt-BR-Chirp3-HD-Kore

# Fallback Edge TTS — descomente se necessário:
# tts:
#   provider: edge_tts

narrators:
  - name: "Ana"
    voice: "pt-BR-ThalitaMultilingualNeural"
    personality: "descontraída, curiosa e bem-humorada — faz perguntas e reage com naturalidade"
  - name: "Carlos"
    voice: "pt-BR-AntonioNeural"
    personality: "analítico e direto — complementa com contexto e opinião assertiva"

vinheta:
  voice: "pt-BR-FranciscaNeural"
  rate: "+15%"

announcements:
  enabled: true

spots:
  - id: reflexao-crista
    type: llm
    topic: "Uma reflexão cristã católica breve e inspiradora para o dia, citando um santo ou passagem bíblica"
    duration_seconds: 30
    max_per_day: 2

spots_config:
  fallback_every: 0
  between_episodes_every: 0

