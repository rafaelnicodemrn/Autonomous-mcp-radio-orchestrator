# ═══════════════════════════════════════════════════════════════════════════════
# GRADE — Briefing Diário + On-Demand
#
# On-demand via terminal (execute quando quiser):
#   Briefing completo:   python main.py biblia utilidades catolicismo noticias tecnologia politica conservadorismo
#   Fé e filosofia:      python main.py biblia catolicismo conservadorismo
#   Tech + IA:           python main.py tecnologia inteligencia-artificial tecnologia-internacional
#   Notícias:            python main.py noticias politica noticias-internacionais
#   Futebol / Grêmio:    python main.py gremio copa brasileirao libertadores
#   Filmes:              python main.py filmes filmes-cartaz
#   Local:               python main.py noticias-locais agronegocio
#   URL avulsa:          python main.py "url:https://site.com/artigo"
# ═══════════════════════════════════════════════════════════════════════════════
schedule:

  # ── Briefing Matinal — dias úteis ─────────────────────────────────────────
  - time: "07:00"
    label: "Briefing Matinal"
    sources: [biblia, utilidades, catolicismo, noticias, tecnologia, politica, conservadorismo]
    days: [mon, tue, wed, thu, fri]

  # ── Briefing Fim de Semana ────────────────────────────────────────────────
  - time: "08:00"
    label: "Briefing Fim de Semana"
    sources: [biblia, utilidades, catolicismo, noticias, conservadorismo, gremio]
    days: [sat, sun]

  # ── Copa do Mundo 2026 — Pontuais ─────────────────────────────────────────
  - time: "11:00"
    date: "2026-06-11"
    label: "Abertura da Copa do Mundo 2026"
    sources: [copa]

  - time: "12:00"
    date: "2026-06-18"
    label: "Copa — Seleção Brasileira estreia"
    sources: [copa]

  - time: "12:00"
    date: "2026-06-21"
    label: "Copa — 2ª rodada Brasil"
    sources: [copa]

  - time: "12:00"
    date: "2026-06-26"
    label: "Copa — 3ª rodada Brasil"
    sources: [copa]

